kind: Deployment
apiVersion: apps/v1
metadata:
  name: deploy
  namespace: nginx
  labels:
    app: nginx

spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      name: pod 
      labels: 
        app: nginx

    spec:
      containers: 
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
