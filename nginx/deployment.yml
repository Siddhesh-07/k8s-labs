kind: Deployment h.  #can scale replicas and also has rolling update.
apiVersion: apps/v1
metadata:
  name: deploy
  namespace: nginx
  labels:
    app: nginx

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      name: pod
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /var/www/html
              name: vol1
      volumes:
        - name: vol1
          persistentVolumeClaim:
            claimName: local-pvc
